# Tema exacto para tu Kitty
color_theme = "kitty_jakoolit"

# Transparencia (coincide con tu Kitty)
background = true
background_opacity = 0.5          # Igual que en Kitty
truecolor = True
force_tty = False

# Estilo visual
rounded_corners = True
graph_symbol = "braille"          # O "tty" si prefieres

# Orden y visualización
show_uptime = True
show_disks = True
show_battery = True
show_cores = True
show_coretemp = True

# Tamaño de las columnas
proc_sorting = "cpu"              # Ordenar procesos por CPU
proc_reversed = False
proc_tree = False                 # Vista plana o en árbol
