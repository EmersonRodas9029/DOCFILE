# ============================================
# VARIABLES DE ENTORNO
# ============================================
env = XDG_RUNTIME_DIR,/run/user/1000
env = WAYLAND_DISPLAY,wayland-0
env = DISPLAY,:0
env = XAUTHORITY,/home/emerson/.Xauthority

# ============================================
# VARIABLES DE PROGRAMA
# ============================================
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher

# ============================================
# CONFIGURACIÓN DEL TECLADO
# ============================================
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = lv3:ralt_switch
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# ============================================
# HABILITAR XWAYLAND
# ============================================
xwayland = true

# ============================================
# AUTOSTART
# ============================================
exec-once = systemctl --user start hyprland-dmemcg-boost@$HYPRLAND_INSTANCE_SIGNATURE

# ============================================
# BINDS PRINCIPALES
# ============================================
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, K, killactive,
bind = $mainMod, R, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,

# ============================================
# APLICACIONES (SUPER + LETRA)
# ============================================
bind = SUPER, B, exec, brave
bind = SUPER, D, exec, DISPLAY=:1 discord
bind = SUPER, V, exec, code
bind = SUPER, S, exec, DISPLAY=:1 prime-run steam
bind = SUPER, N, exec, cava
bind = SUPER, A, exec, DISPLAY=:1 anydesk
bind = $mainMod, P, exec, ~/.local/bin/postman-nvidia
bind = SUPER, W, exec, DISPLAY=:1 mysql-workbench
bind = SUPER, C, exec, ~/.local/bin/docker-desktop-launcher 
bind = $mainMod, O, exec, DISPLAY=:1 onlyoffice-desktopeditors
bind = $mainMod, M, exec, ~/.local/bin/prism


# ============================================
# APLICACIONES CON XWAYLAND

# AMBxst (DEBE IR AL FINAL)
# ============================================
source = ~/.local/share/ambxst/hyprland.conf
bind = SUPER, P, exec, ~/.local/bin/postman

# AnyDesk (Flatpak - usa XWayland)

# ============================================
# CONFIGURACIÓN XWAYLAND
# ============================================
xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = false
}

# Variables para XWayland
env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
exec-once = ~/.local/bin/xwayland-start

bind = ALT, T, exec, OCR4Linux --lang spa+eng --notify



# ============================================
# REGLAS DE VENTANA
# ============================================
# Cava siempre flotante
windowrule = match:class cava, float on

# ============================================
# REDIMENSIONAR VENTANAS FLOTANTES
# ============================================
# Mantener SUPER + CTRL y arrastrar con el ratón
bindm = CTRL, mouse:272, resizewindow

# O usar teclas para redimensionar (con ventana flotante seleccionada)
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# Redimensionamiento más preciso (10px)
bind = $mainMod CTRL SHIFT, right, resizeactive, 10 0
bind = $mainMod CTRL SHIFT, left, resizeactive, -10 0
bind = $mainMod CTRL SHIFT, up, resizeactive, 0 -10
bind = $mainMod CTRL SHIFT, down, resizeactive, 0 10

# ============================================
# MOVER VENTANAS FLOTANTES
# ============================================
# Mover con ratón (SUPER + clic y arrastrar)
bindm = $mainMod, mouse:272, movewindow

# Mover con teclado (20px)
bind = $mainMod CTRL ALT, right, movewindow, 20 0
bind = $mainMod CTRL ALT, left, movewindow, -20 0
bind = $mainMod CTRL ALT, up, movewindow, 0 -20
bind = $mainMod CTRL ALT, down, movewindow, 0 20



